version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: agita_mysql
    restart: always
    environment:
      MYSQL_DATABASE: agita_db
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_USER: luan_dev
      MYSQL_PASSWORD: 1234
    ports:
      - "3306:3306"
    volumes:
      - ./.docker/mysql:/var/lib/mysql